apiVersion: v1
kind: Secret
metadata:
  name: localstore-secrets
  namespace: localstore
  labels:
    app.kubernetes.io/name: localstore
type: Opaque
stringData:
  JWT_SECRET: "super-secret-jwt-key-change-in-production"
  POSTGRES_PASSWORD: "localstore_pass"
  DATABASE_URL: "postgresql://localstore:localstore_pass@postgres-service:5432/localstore_db?schema=public"
