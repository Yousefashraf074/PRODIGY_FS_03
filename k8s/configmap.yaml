apiVersion: v1
kind: ConfigMap
metadata:
  name: localstore-config
  namespace: localstore
  labels:
    app.kubernetes.io/name: localstore
data:
  NODE_ENV: "production"
  PORT: "5000"
  JWT_EXPIRES_IN: "7d"
  CORS_ORIGIN: "http://localhost"
  POSTGRES_DB: "localstore_db"
  POSTGRES_USER: "localstore"
