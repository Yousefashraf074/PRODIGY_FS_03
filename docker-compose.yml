version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: localstore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: localstore_db
      POSTGRES_USER: localstore
      POSTGRES_PASSWORD: localstore_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localstore -d localstore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localstore-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://localstore:localstore_pass@postgres:5432/localstore_db?schema=public"
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-in-production}"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: localstore-frontend
    restart: unless-stopped
    ports:
      - "3005:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: localstore-nginx
    restart: unless-stopped
    ports:
      - "3004:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: localstore-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  prometheus_data:

networks:
  app-network:
    driver: bridge
